<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; color: #24292e; line-height: 1.6; font-size: 15px; }
  h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 2em; }
  h3 { font-size: 1.25em; margin-top: 1.5em; }
  h4 { font-size: 1em; margin-top: 1.2em; }
  h5 { font-size: 0.875em; margin-top: 1em; }
  p { margin: 0.8em 0; }
  ul, ol { padding-left: 2em; margin: 0.5em 0; }
  li { margin: 0.3em 0; }
  li > ul, li > ol { margin: 0.2em 0; }
  strong { font-weight: 600; }
  em { font-style: italic; }
  code { font-family: "SFMono-Regular", Consolas, monospace; background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
  pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  blockquote { border-left: 4px solid #dfe2e5; padding: 0 1em; color: #6a737d; margin: 1em 0; }
  table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  th, td { border: 1px solid #dfe2e5; padding: 8px 13px; text-align: left; }
  th { background: #f6f8fa; font-weight: 600; }
  tr:nth-child(even) { background: #f6f8fa; }
  hr { border: none; border-top: 1px solid #eaecef; margin: 2em 0; }
  a { color: #0366d6; text-decoration: none; }
</style>
